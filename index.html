<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح المصمك - الفتح التاريخي</title>
    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #story-screen {
            position: absolute;
            width: 800px;
            height: 450px;
            background: rgba(19, 24, 32, 0.95);
            border: 3px solid #c9a054;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
            z-index: 100;
        }
        #story-screen h2 { color: #c9a054; font-size: 28px; margin-bottom: 15px; }
        #story-screen p { font-size: 18px; line-height: 1.6; max-width: 600px; color: #e2e8f0; }
        #story-screen button {
            background: #c9a054; color: #131820; border: none; padding: 10px 25px;
            font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 25px;
        }
        #game-container { position: relative; }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 800px;
            background: #161b22;
            padding: 10px 20px;
            box-sizing: border-box;
            border: 2px solid #30363d;
            border-bottom: none;
            font-size: 18px;
            font-weight: bold;
        }
        .stat { color: #c9a054; }
        canvas { background: #0b0f14; display: block; border: 2px solid #30363d; }
    </style>
</head>
<body>

    <div id="story-screen" id="storyScreen">
        <h2>⚔️ العالم الأول: فتح المصمك (الرياض القديمة)</h2>
        <p>"عجلان يحكم حصن المصمك بقبضة من حديد.. الفجر يقترب، وخطة التسلل بدأت.. استعد لفتح الرياض واستعادة هيبة الدار."</p>
        <button onclick="startGame()">ابدأ التسلل 🐎</button>
    </div>

    <div id="game-container">
        <div id="hud">
            <div>❤️ الصحة: <span id="hp" class="stat">3 / 3</span></div>
            <div>🏹 الأسهم: <span id="arrows" class="stat">5</span></div>
            <div>💰 الريالات الذهبية: <span id="gold" class="stat">0</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;

        let gameActive = false;
        let goldCount = 0;
        let arrowCount = 5;
        let health = 3;

        // فيزياء Hollow Knight وسلاسل الحركة
        const gravity = 0.55;
        const friction = 0.85;
        const keys = [];

        // البطل بتصميمه البكسل المطور والجديد
        const player = {
            x: 60,
            y: 200,
            width: 26,
            height: 42,
            velX: 0,
            velY: 0,
            speed: 4.5,
            jumpForce: 11.5,
            grounded: false,
            direction: 'right',
            isAttacking: false,
            attackTimer: 0,
            isAirKicking: false
        };

        // البيئة: أسطح طينية وفوانيس الرياض القديمة
        const platforms = [
            { x: 0, y: 360, width: 800, height: 40, name: 'ground' }, // الأرض
            { x: 180, y: 270, width: 140, height: 14 }, // سطح بيت طيني 1
            { x: 400, y: 190, width: 160, height: 14 }, // سطح بيت طيني 2
            { x: 640, y: 260, width: 120, height: 14 }  // مدخل الحصن الداخلي
        ];

        // الفوانيس المشعة في الليل
        const lanterns = [
            { x: 250, y: 240 },
            { x: 480, y: 160 }
        ];

        // قطع الذهب (الريالات القديمة) للجمع
        let goldCoins = [
            { x: 240, y: 230, collected: false },
            { x: 450, y: 150, collected: false },
            { x: 500, y: 150, collected: false }
        ];

        // السهام المطلقة في الجو
        let activeArrows = [];

        function startGame() {
            document.getElementById("story-screen").style.display = "none";
            gameActive = true;
        }

        // رسم البطل بالبشت والشماغ وعيون البكسل الواضحة
        function drawPlayer() {
            // الشماغ الأحمر والعقال الأسود
            ctx.fillStyle = "#e63946"; 
            ctx.fillRect(player.x + 3, player.y, 20, 12);
            ctx.fillStyle = "#111"; 
            ctx.fillRect(player.x + 5, player.y + 2, 16, 3);

            // الوجه والتفاصيل
            ctx.fillStyle = "#ffdbac"; 
            ctx.fillRect(player.x + 5, player.y + 8, 16, 7);
            ctx.fillStyle = "#000"; // العيون
            let eyeOffset = player.direction === 'right' ? 3 : 0;
            ctx.fillRect(player.x + 7 + eyeOffset, player.y + 9, 2, 3);
            ctx.fillRect(player.x + 12 + eyeOffset, player.y + 9, 2, 3);

            // البشت الفخم (العباءة تتحرك مع الحركة)
            ctx.fillStyle = "#1f1f1f"; 
            ctx.fillRect(player.x, player.y + 15, 26, 23);
            // تطريز الزري الذهبي على البشت
            ctx.fillStyle = "#d4af37";
            ctx.fillRect(player.x + 6, player.y + 15, 2, 23);
            ctx.fillRect(player.x + 18, player.y + 15, 2, 23);

            // الأقدام البكسل
            ctx.fillStyle = "#111";
            ctx.fillRect(player.x + 3, player.y + 38, 6, 4);
            ctx.fillRect(player.x + 17, player.y + 38, 6, 4);

            // تأثير هجوم السيف الأرضي (F) مع أثر ضوئي بكسل أبيض/فضي
            if (player.isAttacking && !player.isAirKicking) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                if (player.direction === 'right') {
                    ctx.fillRect(player.x + 26, player.y + 16, 28, 10); // نصل السيف المضيء
                    ctx.fillStyle = "#d4af37"; // المقبض الذهبي
                    ctx.fillRect(player.x + 26, player.y + 14, 3, 14);
                } else {
                    ctx.fillRect(player.x - 28, player.y + 16, 28, 10);
                    ctx.fillStyle = "#d4af37";
                    ctx.fillRect(player.x - 1, player.y + 14, 3, 14);
                }
            }

            // تأثير الركلة الجوية (Air Kick)
            if (player.isAirKicking) {
                ctx.fillStyle = "#ffdbac";
                if (player.direction === 'right') {
                    ctx.fillRect(player.x + 24, player.y + 26, 12, 8);
                } else {
                    ctx.fillRect(player.x - 12, player.y + 26, 12, 8);
                }
            }
        }

        // رسم البيئة والفوانيس المشعة
        function drawEnvironment() {
            // رسم الفوانيس الطينية بنورها الدافئ
            lanterns.forEach(l => {
                // هالة الضوء الدائرية
                let gradient = ctx.createRadialGradient(l.x+6, l.y+8, 2, l.x+6, l.y+8, 45);
                gradient.addColorStop(0, 'rgba(212, 175, 55, 0.4)');
                gradient.addColorStop(1, 'rgba(11, 15, 20, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.arc(l.x+6, l.y+8, 45, 0, Math.PI*2); ctx.fill();

                // جسم الفانوس الطيني
                ctx.fillStyle = "#8b5a2b";
                ctx.fillRect(l.x, l.y, 12, 16);
                ctx.fillStyle = "#ffcc00"; // الشعلة بالداخل
                ctx.fillRect(l.x + 4, l.y + 4, 4, 6);
            });

            // رسم المنصات والأسطح
            platforms.forEach(p => {
                ctx.fillStyle = "#5c4033"; // لون الطين التراثي القديم للبيوت
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#3e2723"; // ظلال الطوب السفلي
                ctx.fillRect(p.x, p.y + p.height - 4, p.width, 4);
            });

            // رسم الريالات الذهبية
            goldCoins.forEach(c => {
                if (!c.collected) {
                    ctx.fillStyle = "#d4af37";
                    ctx.beginPath(); ctx.arc(c.x, c.y, 6, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.fillRect(c.x-1, c.y-1, 2, 2); // لمعة عملة السدو
                }
            });

            // رسم الأسهم الطائرة (G)
            ctx.fillStyle = "#e0e0e0";
            activeArrows.forEach(arrow => {
                ctx.fillRect(arrow.x, arrow.y, 12, 3);
            });
        }

        function update() {
            if (!gameActive) return;

            // حركات الـ Keyboard (A و D)
            if (keys[65]) { player.velX = -player.speed; player.direction = 'left'; } // A يسار
            if (keys[68]) { player.velX = player.speed; player.direction = 'right'; }  // D يمين

            // القفز (Spacebar)
            if (keys[32] && !player.jumping && player.grounded) {
                player.jumping = true;
                player.grounded = false;
                player.velY = -player.jumpForce;
            }

            // تطبيق الجاذبية والاحتكاك المتقدم
            player.velX *= friction;
            player.velY += gravity;
            player.grounded = false;

            // كشف الاصطدام والوقوف فوق أسطح البيوت الطينية
            platforms.forEach(p => {
                if (player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y + player.height <= p.y + 8 && player.y + player.height + player.velY >= p.y) {
                    player.jumping = false;
                    player.grounded = true;
                    player.isAirKicking = false; // إلغاء الركلة عند لمس الأرض
                    player.velY = 0;
                    player.y = p.y - player.height;
                }
            });

            player.x += player.velX;
            player.y += player.velY;

            // منع الخروج من حدود الشاشة
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // إدارة توقيت ضربة السيف والركلة
            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) {
                    player.isAttacking = false;
                    player.isAirKicking = false;
                }
            }

            // تفعيل حركة الركلة الجوية في حال كان بالهواء وضغط هجوم
            if (player.jumping && player.isAttacking) {
                player.isAirKicking = true;
            }

            // تحريك الأسهم المطلقة
            activeArrows.forEach((arrow, index) => {
                arrow.x += arrow.dir === 'right' ? 8 : -8;
                if (arrow.x > canvas.width || arrow.x < 0) activeArrows.splice(index, 1);
            });

            // جمع العملات الريالية القديمة
            goldCoins.forEach(c => {
                if (!c.collected && player.x < c.x + 6 && player.x + player.width > c.x - 6 &&
                    player.y < c.y + 6 && player.y + player.height > c.y - 6) {
                    c.collected = true;
                    goldCount += 5; // كل قطعة بـ 5 ريال ذهبي
                    document.getElementById("gold").innerText = goldCount;
                }
            });
        }

        // الاستماع لضغطات الكيبورد بدقة (A, D, Space, F, G)
        window.addEventListener("keydown", e => {
            keys[e.keyCode] = true;

            // زر F: ضربة السيف أو الركلة الجوية
            if (e.keyCode === 70 && !player.isAttacking) {
                player.isAttacking = true;
                player.attackTimer = 10; // عدد الإطارات للضربة
            }

            // زر G: إطلاق الأسهم بعيدة المدى
            if (e.keyCode === 71 && arrowCount > 0 && !player.isAttacking) {
                arrowCount--;
                document.getElementById("arrows").innerText = arrowCount;
                activeArrows.push({
                    x: player.direction === 'right' ? player.x + player.width : player.x - 12,
                    y: player.y + 20,
                    dir: player.direction
                });
                // ارتداد خفيف للخلف عند الإطلاق تشبه ألعاب الأكشن الاحترافية
                player.velX += player.direction === 'right' ? -3 : 3;
            }
        });
        window.addEventListener("keyup", e => keys[e.keyCode] = false);

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawEnvironment();
            drawPlayer();
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
