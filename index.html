<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة حصن المصمك الأركيد</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        canvas {
            border: 4px solid #fff;
            background: #e0f6ff;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .controls {
            margin-top: 15px;
            font-size: 16px;
            color: #ccc;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">الذهب: <span id="goldScore">0</span> | المرحلة: <span id="levelNum">1</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">التحكم: الأسهم (يمين/يسار) للحركة | سهم فوق للقفز | زر F لضرب السيف ⚔️</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // الحفاظ على جودة البكسل الـ Retro
        ctx.imageSmoothingEnabled = false;

        let gold = 0;
        let currentLevel = 1;

        // كائن اللاعب (البطل بالبشت والشماغ)
        const player = {
            x: 50,
            y: 300,
            width: 32,
            height: 50,
            speed: 5,
            velX: 0,
            velY: 0,
            jumping: false,
            grounded: false,
            isAttacking: false,
            attackTimer: 0,
            direction: "right" // اتجاه الوجه لضرب السيف
        };

        // الأعداء (الحراس)
        let enemies = [
            { x: 450, y: 320, width: 30, height: 30, speed: 2, range: 120, startX: 450 }
        ];

        // الذهب اللامع
        let coins = [
            { x: 200, y: 240, width: 14, height: 14, collected: false },
            { x: 350, y: 180, width: 14, height: 14, collected: false },
            { x: 550, y: 220, width: 14, height: 14, collected: false }
        ];

        // بوابة المصمك التاريخية
        const gate = { x: 720, y: 260, width: 55, height: 90 };

        const gravity = 0.6;
        const friction = 0.82;
        const keys = [];

        // رسم البطل (بكسل آرت: شماغ أحمر، بشت أسود بزري ذهبي، ثوب أبيض)
        function drawPlayer() {
            // الشماغ والعقال
            ctx.fillStyle = "#ff2222"; // الشماغ الأحمر
            ctx.fillRect(player.x + 4, player.y, 24, 12);
            ctx.fillStyle = "#111111"; // العقال الأسود
            ctx.fillRect(player.x + 6, player.y + 4, 20, 3);
            ctx.fillStyle = "#ffffff"; // نقوش الشماغ البيضاء
            ctx.fillRect(player.x + 10, player.y + 2, 12, 2);
            
            // الوجه واللحية
            ctx.fillStyle = "#ffdbac"; 
            ctx.fillRect(player.x + 8, player.y + 12, 16, 10);
            ctx.fillStyle = "#221100"; // اللحية والشارب
            ctx.fillRect(player.x + 8, player.y + 18, 16, 4);

            // البشت الأسود والثوب الأبيض
            ctx.fillStyle = "#151515"; // البشت العتيق
            ctx.fillRect(player.x + 2, player.y + 22, 28, 28);
            ctx.fillStyle = "#ffffff"; // الثوب الأبيض من المنتصف
            ctx.fillRect(player.x + 12, player.y + 22, 8, 28);
            
            // الزري الذهبي المطرز على أطراف البشت
            ctx.fillStyle = "#ffd700"; 
            ctx.fillRect(player.x + 10, player.y + 22, 2, 22);
            ctx.fillRect(player.x + 20, player.y + 22, 2, 22);

            // تأثير ضربة السيف ⚔️
            if (player.isAttacking) {
                ctx.fillStyle = "#dddddd"; // نصل السيف الفضي
                if (player.direction === "right") {
                    ctx.fillRect(player.x + 30, player.y + 24, 22, 6);
                    ctx.fillStyle = "#ffd700"; // مقبض ذهبي
                    ctx.fillRect(player.x + 28, player.y + 22, 3, 10);
                } else {
                    ctx.fillRect(player.x - 20, player.y + 24, 22, 6);
                    ctx.fillStyle = "#ffd700";
                    ctx.fillRect(player.x + 1, player.y + 22, 3, 10);
                }
            }
        }

        // رسم الحارس الصغير
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = "#8b5a2b"; // ملابس طينية متناسقة مع الحصن
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                ctx.fillStyle = "#444"; // خوذة حماية دائرية
                ctx.fillRect(enemy.x + 4, enemy.y - 4, 22, 4);
                // عين الحارس الغاضبة
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(enemy.x + (enemy.speed > 0 ? 20 : 5), enemy.y + 6, 4, 4);
            });
        }

        // رسم الذهب
        function drawCoins() {
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillStyle = "#ffd700"; // لون الذهب اللامع
                    ctx.beginPath();
                    ctx.arc(coin.x + 7, coin.y + 7, 7, 0, Math.PI * 2);
                    ctx.fill();
                    // لمعة داخل الذهب
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(coin.x + 4, coin.y + 4, 3, 3);
                }
            });
        }

        // رسم البيئة وحصن المصمك في الخلفية
        function drawBackground() {
            // سماء وقت العصر
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // شمس الرياض الدافئة
            ctx.fillStyle = "#ff6600";
            ctx.beginPath();
            ctx.arc(700, 80, 45, 0, Math.PI * 2);
            ctx.fill();

            // الأرضية الطينية الصلبة
            ctx.fillStyle = "#cdaf95";
            ctx.fillRect(0, 350, canvas.width, 50);
            ctx.fillStyle = "#8b7355"; // خط تفصيلي للأرض
            ctx.fillRect(0, 350, canvas.width, 4);

            // بوابة المصمك الخشبية الكبيرة
            ctx.fillStyle = "#5c4033"; // خشب غامق
            ctx.fillRect(gate.x, gate.y, gate.width, gate.height);
            ctx.fillStyle = "#8b5a2b"; // نقوش البوابة
            ctx.fillRect(gate.x + 6, gate.y + 6, gate.width - 12, gate.height - 6);
            // مقبض البوابة الحديدي (الحلقة)
            ctx.fillStyle = "#111";
            ctx.beginPath();
            ctx.arc(gate.x + 15, gate.y + 45, 5, 0, Math.PI * 2);
            ctx.stroke();
        }

        // تحديث حركة اللعبة والفيزياء والاصطدامات
        function update() {
            // تحريك يمين
            if (keys[39] || keys[68]) { 
                if (player.velX < player.speed) player.velX++;
                player.direction = "right";
            }
            // تحريك يسار
            if (keys[37] || keys[65]) { 
                if (player.velX > -player.speed) player.velX--;
                player.direction = "left";
            }
            // قفز
            if (keys[38] || keys[32] || keys[87]) { 
                if (!player.jumping && player.grounded) {
                    player.jumping = true;
                    player.grounded = false;
                    player.velY = -player.speed * 2.4;
                }
            }

            player.velX *= friction;
            player.velY += gravity;

            player.grounded = false;
            player.x += player.velX;
            player.y += player.velY;

            // نظام الجاذبية والوقوف على الأرض
            if (player.y >= 350 - player.height) {
                player.y = 350 - player.height;
                player.jumping = false;
                player.grounded = true;
                player.velY = 0;
            }

            // منع اللاعب من الخروج خارج الشاشة
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // توقيت ضربة السيف
            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            // حركة الحراس والقتال
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.speed;
                if (Math.abs(enemy.x - enemy.startX) > enemy.range) {
                    enemy.speed = -enemy.speed; // عكس الاتجاه عند نهاية المسار
                }

                // شرط ضرب الحارس بالسيف الكفو
                let swordHit = false;
                if (player.isAttacking) {
                    if (player.direction === "right" && player.x + player.width + 20 > enemy.x && player.x < enemy.x + enemy.width && player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                        swordHit = true;
                    } else if (player.direction === "left" && player.x - 20 < enemy.x + enemy.width && player.x + player.width > enemy.x && player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                        swordHit = true;
                    }
                }

                if (swordHit) {
                    enemies.splice(index, 1); // اختفاء الحارس المهزوم
                } 
                // إذا لمس الحارس اللاعب بدون ضربة سيف (إعادة هيبة المرحلة)
                else if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
                    player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
                    resetLevel();
                }
            });

            // التقاط قطع الذهب الوفير
            coins.forEach(coin => {
                if (!coin.collected &&
                    player.x < coin.x + coin.width && player.x + player.width > coin.x &&
                    player.y < coin.y + coin.height && player.y + player.height > coin.y) {
                    coin.collected = true;
                    gold++;
                    document.getElementById("goldScore").innerText = gold;
                }
            });

            // الوصول للبوابة والانتقال للمراحل أو الفوز النهائي
            if (player.x < gate.x + gate.width && player.x + player.width > gate.x &&
                player.y < gate.y + gate.height && player.y + player.height > gate.y) {
                if (currentLevel === 1) {
                    currentLevel = 2;
                    document.getElementById("levelNum").innerText = currentLevel;
                    setupLevel2();
                } else {
                    alert("كفو وبيض الله وجهك! فتحت حصن المصمك وانتصرت في اللعبة! 👑🇸🇦");
                    currentLevel = 1;
                    gold = 0;
                    document.getElementById("levelNum").innerText = currentLevel;
                    document.getElementById("goldScore").innerText = gold;
                    resetLevel();
                }
            }
        }

        // إعادة ضبط اللعبة عند الخسارة
        function resetLevel() {
            player.x = 50;
            player.y = 300;
            player.velX = 0;
            player.velY = 0;
            if (currentLevel === 1) {
                enemies = [{ x: 450, y: 320, width: 30, height: 30, speed: 2, range: 120, startX: 450 }];
                coins.forEach(c => c.collected = false);
            } else {
                setupLevel2();
            }
        }

        // تجهيز تحديات المرحلة الثانية
        function setupLevel2() {
            player.x = 50;
            // حراس أكثر سرعة وحركة متقاطعة
            enemies = [
                { x: 280, y: 320, width: 30, height: 30, speed: 3.5, range: 90, startX: 280 },
                { x: 520, y: 320, width: 30, height: 30, speed: -4, range: 110, startX: 520 }
            ];
            coins.forEach(c => c.collected = false);
        }

        // حلقة التشغيل اللانهائية للعبة
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawPlayer();
            drawEnemies();
            drawCoins();
            update();
            requestAnimationFrame(gameLoop);
        }

        // الاستماع لأزرار التحكم بالكيبورد
        document.body.addEventListener("keydown", function (e) {
            keys[e.keyCode] = true;
            if (e.keyCode === 70) { // زر F لضرب السيف
                player.isAttacking = true;
                player.attackTimer = 12; // مدة بقاء السيف ظاهر بالبكسل
            }
        });

        document.body.addEventListener("keyup", function (e) {
            keys[e.keyCode] = false;
        });

        // تشغيل اللعبة فوراً
        gameLoop();
    </script>
</body>
</html>
